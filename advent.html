<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier de l'Avent Mathématique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0a0e1a;
    --deep-blue: #0f1629;
    --navy: #162042;
    --gold: #d4a843;
    --gold-light: #f0d68a;
    --gold-dim: #8a6d2b;
    --snow: #e8eaf0;
    --frost: #a8b4cc;
    --red: #c0392b;
    --green-dark: #1a3a2a;
    --green: #2d6a4f;
    --star: #f1c40f;
    --correct: #27ae60;
    --wrong: #e74c3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--midnight);
    color: var(--snow);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SNOWFALL ===== */
  .snowfall {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .snowflake {
    position: absolute;
    top: -10px;
    color: rgba(255,255,255,0.6);
    font-size: 1em;
    animation: fall linear infinite;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(360deg); }
  }

  /* ===== STARS BACKGROUND ===== */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  .star-dot {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* ===== HEADER ===== */
  .header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2.5rem 1rem 1rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px rgba(212,168,67,0.3));
  }
  .header .subtitle {
    font-size: 0.95rem;
    color: var(--frost);
    margin-top: 0.4rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ===== SCORE BAR ===== */
  .score-bar {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0.8rem 1rem;
    margin: 0 auto;
    max-width: 500px;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    color: var(--frost);
  }
  .score-item .icon { font-size: 1.1rem; }
  .score-item .val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--gold-light);
  }

  /* ===== CALENDAR GRID ===== */
  .calendar-container {
    position: relative;
    z-index: 2;
    max-width: 820px;
    margin: 1rem auto 3rem;
    padding: 0 1rem;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .calendar-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  }

  /* ===== DOOR ===== */
  .door {
    aspect-ratio: 1;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    perspective: 600px;
    transition: transform 0.2s;
  }
  .door:hover { transform: scale(1.05); }
  .door:active { transform: scale(0.97); }

  .door-face {
    width: 100%; height: 100%;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, var(--navy), var(--deep-blue));
    border: 1.5px solid rgba(212,168,67,0.25);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.3s;
  }
  .door:hover .door-face {
    border-color: var(--gold);
    box-shadow: 0 4px 30px rgba(212,168,67,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .door-num {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: var(--gold);
  }
  .door-icon {
    font-size: 0.7rem;
    margin-top: 2px;
    opacity: 0.6;
  }

  /* States */
  .door.opened .door-face {
    background: linear-gradient(145deg, var(--green-dark), #0d2618);
    border-color: var(--correct);
  }
  .door.opened .door-num { color: var(--correct); }
  .door.opened .door-icon::after { content: '✓'; color: var(--correct); }

  .door.failed .door-face {
    background: linear-gradient(145deg, #2a1015, #1a0a0d);
    border-color: rgba(231,76,60,0.4);
  }
  .door.failed .door-num { color: var(--wrong); opacity: 0.7; }
  .door.failed .door-icon::after { content: '✗'; color: var(--wrong); }

  .door.locked {
    cursor: not-allowed;
    opacity: 0.35;
  }
  .door.locked:hover { transform: none; }

  /* ===== MODAL OVERLAY ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5,7,15,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: linear-gradient(160deg, #131a33, #0c1022);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    padding: 2.5rem 2rem 2rem;
    position: relative;
    box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 60px rgba(212,168,67,0.08);
    animation: modalIn 0.35s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-day {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--midnight);
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.1rem;
    padding: 0.35rem 1.4rem;
    border-radius: 30px;
  }

  .modal-category {
    text-align: center;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-top: 0.8rem;
  }

  .modal-question {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    line-height: 1.6;
    text-align: center;
    margin: 1.5rem 0;
    color: var(--snow);
  }
  .modal-question .math {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold-light);
    font-size: 1.1em;
  }

  /* Timer */
  .timer-ring-container {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .timer-ring {
    position: relative;
    width: 90px; height: 90px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 90px; height: 90px;
  }
  .timer-ring circle {
    fill: none;
    stroke-width: 4;
  }
  .timer-ring .bg { stroke: rgba(255,255,255,0.06); }
  .timer-ring .progress {
    stroke: var(--gold);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-ring .progress.danger { stroke: var(--wrong); }
  .timer-ring .timer-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--snow);
  }
  .timer-ring .timer-text.danger { color: var(--wrong); }

  /* Choices */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .choice-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    padding: 0.9rem 0.5rem;
    border: 1.5px solid rgba(212,168,67,0.2);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    color: var(--snow);
    cursor: pointer;
    transition: all 0.2s;
  }
  .choice-btn:hover {
    background: rgba(212,168,67,0.1);
    border-color: var(--gold);
    transform: translateY(-2px);
  }
  .choice-btn.correct {
    background: rgba(39,174,96,0.2);
    border-color: var(--correct);
    color: var(--correct);
  }
  .choice-btn.wrong {
    background: rgba(231,76,60,0.15);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .choice-btn:disabled { cursor: default; opacity: 0.7; }

  /* Feedback */
  .feedback {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    min-height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }
  .feedback.timeout { color: var(--frost); }

  .btn-close-modal {
    display: none;
    margin: 1rem auto 0;
    padding: 0.6rem 2rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--midnight);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-close-modal:hover { transform: scale(1.05); }
  .btn-close-modal.show { display: block; }

  /* ===== COMPLETION SCREEN ===== */
  .completion {
    display: none;
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 3rem 1rem;
  }
  .completion.active { display: block; }
  .completion h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold-light);
    margin-bottom: 1rem;
  }
  .completion .final-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    color: var(--star);
  }
  .completion .final-label {
    color: var(--frost);
    font-size: 1rem;
    margin-top: 0.3rem;
  }
  .completion .message {
    color: var(--frost);
    font-size: 1.05rem;
    margin-top: 1.5rem;
    line-height: 1.6;
  }
  .btn-restart {
    margin-top: 2rem;
    padding: 0.8rem 2.5rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--midnight);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-restart:hover { transform: scale(1.06); }

  /* ===== FOOTER ===== */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 1rem;
    color: rgba(168,180,204,0.4);
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>
<!-- Snowfall -->
<div class="snowfall" id="snowfall"></div>

<!-- Header -->
<div class="header">
  <h1>Calendrier de l'Avent Mathématique</h1>
  <div class="subtitle">24 énigmes · 60 secondes chacune</div>
</div>

<!-- Score bar -->
<div class="score-bar">
  <div class="score-item">
    <span class="icon">⭐</span>
    <span>Score :</span>
    <span class="val" id="score">0</span><span class="val">/24</span>
  </div>
  <div class="score-item">
    <span class="icon">🔥</span>
    <span>Série :</span>
    <span class="val" id="streak">0</span>
  </div>
</div>

<!-- Calendar Grid -->
<div class="calendar-container">
  <div class="calendar-grid" id="grid"></div>
</div>

<!-- Completion screen -->
<div class="completion" id="completion">
  <h2>🎄 Calendrier terminé ! 🎄</h2>
  <div class="final-score" id="finalScore"></div>
  <div class="final-label">bonnes réponses sur 24</div>
  <div class="message" id="finalMsg"></div>
  <button class="btn-restart" onclick="restart()">Recommencer</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-day" id="modalDay">Jour 1</div>
    <div class="modal-category" id="modalCat"></div>
    <div class="modal-question" id="modalQ"></div>
    <div class="timer-ring-container">
      <div class="timer-ring">
        <svg viewBox="0 0 90 90">
          <circle class="bg" cx="45" cy="45" r="40"/>
          <circle class="progress" id="timerCircle" cx="45" cy="45" r="40"
            stroke-dasharray="251.33" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timerText">60</div>
      </div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-close-modal" id="btnClose" onclick="closeModal()">Continuer</button>
  </div>
</div>

<div class="footer">Niveau secondaire · Algèbre, géométrie, logique, probabilités</div>

<script>
// ========== QUESTIONS ==========
const questions = [
  {
    cat: "Algèbre",
    q: "Résoudre : <span class='math'>2x + 7 = 23</span>",
    choices: ["x = 6", "x = 8", "x = 7", "x = 9"],
    answer: 1
  },
  {
    cat: "Géométrie",
    q: "Quelle est l'aire d'un triangle de base <span class='math'>12 cm</span> et de hauteur <span class='math'>5 cm</span> ?",
    choices: ["60 cm²", "30 cm²", "17 cm²", "24 cm²"],
    answer: 1
  },
  {
    cat: "Arithmétique",
    q: "Quel est le PGCD de <span class='math'>84</span> et <span class='math'>56</span> ?",
    choices: ["14", "28", "7", "12"],
    answer: 1
  },
  {
    cat: "Probabilités",
    q: "On lance un dé équilibré. Quelle est la probabilité d'obtenir un nombre premier ?",
    choices: ["1/3", "1/2", "2/3", "1/6"],
    answer: 1
  },
  {
    cat: "Puissances",
    q: "Simplifier : <span class='math'>2⁴ × 2³</span>",
    choices: ["2⁷ = 128", "2¹² = 4096", "2¹ = 2", "6⁷"],
    answer: 0
  },
  {
    cat: "Fractions",
    q: "Calculer : <span class='math'>3/4 + 5/6</span>",
    choices: ["8/10", "19/12", "15/24", "2/3"],
    answer: 1
  },
  {
    cat: "Pythagore",
    q: "Un triangle rectangle a pour côtés <span class='math'>3</span> et <span class='math'>4</span>. Quelle est l'hypoténuse ?",
    choices: ["7", "6", "5", "√7"],
    answer: 2
  },
  {
    cat: "Fonctions",
    q: "Soit <span class='math'>f(x) = 3x² − 2</span>. Que vaut <span class='math'>f(−1)</span> ?",
    choices: ["1", "−5", "5", "−1"],
    answer: 0
  },
  {
    cat: "Statistiques",
    q: "Quelle est la médiane de la série : <span class='math'>3, 7, 1, 9, 5</span> ?",
    choices: ["5", "7", "3", "6"],
    answer: 0
  },
  {
    cat: "Proportionnalité",
    q: "Si <span class='math'>3 kg</span> de pommes coûtent <span class='math'>4,50 CHF</span>, combien coûtent <span class='math'>7 kg</span> ?",
    choices: ["9,50 CHF", "10,50 CHF", "11,50 CHF", "7,50 CHF"],
    answer: 1
  },
  {
    cat: "Logique",
    q: "Combien y a-t-il de carrés sur un échiquier 3×3 ?",
    choices: ["9", "14", "10", "13"],
    answer: 1
  },
  {
    cat: "Algèbre",
    q: "Développer : <span class='math'>(x + 3)²</span>",
    choices: ["x² + 9", "x² + 6x + 9", "x² + 3x + 9", "2x + 6"],
    answer: 1
  },
  {
    cat: "Géométrie",
    q: "Quel est le périmètre d'un cercle de rayon <span class='math'>7 cm</span> ? (arrondi à l'unité)",
    choices: ["44 cm", "22 cm", "154 cm", "38 cm"],
    answer: 0
  },
  {
    cat: "Équations",
    q: "Résoudre : <span class='math'>x² − 9 = 0</span>",
    choices: ["x = 3", "x = 9", "x = 3 ou x = −3", "x = −9"],
    answer: 2
  },
  {
    cat: "Pourcentages",
    q: "Un article à <span class='math'>80 CHF</span> est soldé à <span class='math'>−25%</span>. Quel est le nouveau prix ?",
    choices: ["55 CHF", "60 CHF", "65 CHF", "20 CHF"],
    answer: 1
  },
  {
    cat: "Suites",
    q: "Quel est le prochain terme : <span class='math'>2, 6, 18, 54, …</span> ?",
    choices: ["108", "162", "72", "216"],
    answer: 1
  },
  {
    cat: "Thalès",
    q: "Deux droites parallèles coupent deux sécantes. Si les segments valent <span class='math'>4</span>, <span class='math'>6</span> et <span class='math'>10</span>, que vaut le 4ᵉ ?",
    choices: ["12", "15", "8", "20"],
    answer: 1
  },
  {
    cat: "Racines",
    q: "Simplifier : <span class='math'>√50</span>",
    choices: ["5√2", "25√2", "2√5", "√25 + √25"],
    answer: 0
  },
  {
    cat: "Probabilités",
    q: "On tire une carte d'un jeu de 52. Quelle est la probabilité d'obtenir un as ?",
    choices: ["1/13", "1/52", "4/52", "1/4"],
    answer: 0
  },
  {
    cat: "Volumes",
    q: "Quel est le volume d'une sphère de rayon <span class='math'>3 cm</span> ? (en cm³, arrondi)",
    choices: ["113", "84", "36π", "28"],
    answer: 0
  },
  {
    cat: "Logique",
    q: "Si tous les <span class='math'>A</span> sont des <span class='math'>B</span>, et que <span class='math'>x</span> n'est pas un <span class='math'>B</span>, alors :",
    choices: ["x est un A", "x n'est pas un A", "On ne sait pas", "x est un B"],
    answer: 1
  },
  {
    cat: "Discriminant",
    q: "Soit <span class='math'>x² + 4x + 4 = 0</span>. Combien de solutions réelles ?",
    choices: ["0", "1 (double)", "2", "Infini"],
    answer: 1
  },
  {
    cat: "Trigonométrie",
    q: "Dans un triangle rectangle, si <span class='math'>sin(α) = 0.5</span>, que vaut <span class='math'>α</span> ?",
    choices: ["45°", "60°", "30°", "90°"],
    answer: 2
  },
  {
    cat: "Calcul littéral",
    q: "Factoriser : <span class='math'>x² − 16</span>",
    choices: ["(x−4)²", "(x−8)(x+2)", "(x−4)(x+4)", "(x−16)(x+1)"],
    answer: 2
  }
];

// ========== STATE ==========
let score = 0;
let streak = 0;
let maxStreak = 0;
let answered = new Array(24).fill(null); // null, true, false
let timerInterval = null;
let timeLeft = 60;
let currentDay = -1;

// ========== INIT ==========
function init() {
  createStars();
  createSnow();
  buildGrid();
}

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDelay = (Math.random()*5) + 's';
    s.style.width = s.style.height = (Math.random()*2+1) + 'px';
    c.appendChild(s);
  }
}

function createSnow() {
  const c = document.getElementById('snowfall');
  const flakes = ['❄','❅','❆','·','•'];
  for (let i = 0; i < 35; i++) {
    const f = document.createElement('div');
    f.className = 'snowflake';
    f.textContent = flakes[Math.floor(Math.random()*flakes.length)];
    f.style.left = Math.random()*100 + '%';
    f.style.fontSize = (Math.random()*0.8+0.4) + 'em';
    f.style.opacity = Math.random()*0.5+0.2;
    f.style.animationDuration = (Math.random()*8+6) + 's';
    f.style.animationDelay = (Math.random()*10) + 's';
    c.appendChild(f);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  // Shuffle door order for a non-sequential look
  const order = [
    15, 3, 22, 8, 1, 17,
    11, 24, 6, 19, 4, 13,
    20, 9, 2, 16, 23, 7,
    14, 5, 21, 10, 18, 12
  ];
  order.forEach(day => {
    const idx = day - 1;
    const door = document.createElement('div');
    door.className = 'door';
    door.id = 'door-' + day;
    if (answered[idx] === true) door.classList.add('opened');
    else if (answered[idx] === false) door.classList.add('failed');

    door.innerHTML = `
      <div class="door-face">
        <div class="door-num">${day}</div>
        <div class="door-icon"></div>
      </div>
    `;
    door.addEventListener('click', () => openDoor(day));
    grid.appendChild(door);
  });
}

// ========== OPEN DOOR ==========
function openDoor(day) {
  const idx = day - 1;
  if (answered[idx] !== null) return;

  currentDay = day;
  const q = questions[idx];

  document.getElementById('modalDay').textContent = 'Jour ' + day;
  document.getElementById('modalCat').textContent = q.cat;
  document.getElementById('modalQ').innerHTML = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnClose').classList.remove('show');

  // Build choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.addEventListener('click', () => selectAnswer(i));
    choicesEl.appendChild(btn);
  });

  // Reset timer
  timeLeft = 60;
  updateTimerDisplay();
  document.getElementById('timerCircle').style.strokeDashoffset = '0';
  document.getElementById('timerCircle').classList.remove('danger');
  document.getElementById('timerText').classList.remove('danger');

  // Show modal
  document.getElementById('modalOverlay').classList.add('active');

  // Start timer
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const circumference = 251.33;
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    const offset = circumference * (1 - timeLeft / 60);
    document.getElementById('timerCircle').style.strokeDashoffset = offset;

    if (timeLeft <= 10) {
      document.getElementById('timerCircle').classList.add('danger');
      document.getElementById('timerText').classList.add('danger');
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timerText').textContent = timeLeft;
}

// ========== ANSWER ==========
function selectAnswer(chosen) {
  clearInterval(timerInterval);
  const idx = currentDay - 1;
  const q = questions[idx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  // Highlight correct
  btns[q.answer].classList.add('correct');

  if (chosen === q.answer) {
    answered[idx] = true;
    score++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback').innerHTML = '🎉 Correct ! Bien joué !';
    document.getElementById('door-' + currentDay).classList.add('opened');
  } else {
    btns[chosen].classList.add('wrong');
    answered[idx] = false;
    streak = 0;
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback').innerHTML = '❌ Raté ! La réponse était : <strong>' + q.choices[q.answer] + '</strong>';
    document.getElementById('door-' + currentDay).classList.add('failed');
  }

  updateScore();
  document.getElementById('btnClose').classList.add('show');
}

function handleTimeout() {
  const idx = currentDay - 1;
  const q = questions[idx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.answer].classList.add('correct');

  answered[idx] = false;
  streak = 0;
  document.getElementById('feedback').className = 'feedback timeout';
  document.getElementById('feedback').innerHTML = '⏰ Temps écoulé ! Réponse : <strong>' + q.choices[q.answer] + '</strong>';
  document.getElementById('door-' + currentDay).classList.add('failed');

  updateScore();
  document.getElementById('btnClose').classList.add('show');
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  clearInterval(timerInterval);

  // Check if all 24 answered
  if (answered.every(a => a !== null)) {
    showCompletion();
  }
}

// ========== COMPLETION ==========
function showCompletion() {
  document.querySelector('.calendar-container').style.display = 'none';
  document.querySelector('.score-bar').style.display = 'none';
  const comp = document.getElementById('completion');
  comp.classList.add('active');
  document.getElementById('finalScore').textContent = score + ' / 24';

  let msg = '';
  const pct = score / 24;
  if (pct === 1) msg = '🌟 Parfait ! Tu maîtrises tout — impressionnant !';
  else if (pct >= 0.8) msg = '🎄 Excellent travail ! Quelques détails à revoir, mais c\'est très solide.';
  else if (pct >= 0.6) msg = '👏 Bon résultat ! Continue à t\'entraîner sur les thèmes manqués.';
  else if (pct >= 0.4) msg = '💪 Pas mal ! Reprends les notions qui t\'ont posé problème.';
  else msg = '📚 Il y a du travail, mais chaque erreur est un pas vers la compréhension !';

  msg += '<br><br>Meilleure série : <strong>' + maxStreak + '</strong> réponses consécutives.';
  document.getElementById('finalMsg').innerHTML = msg;
}

function restart() {
  score = 0; streak = 0; maxStreak = 0;
  answered = new Array(24).fill(null);
  updateScore();
  document.querySelector('.calendar-container').style.display = 'block';
  document.querySelector('.score-bar').style.display = 'flex';
  document.getElementById('completion').classList.remove('active');
  buildGrid();
}

// ========== GO ==========
init();
</script>
